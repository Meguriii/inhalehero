<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>InhaleHero</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ===== GAME SCREEN ===== -->
  <div class="screen active" id="gameScreen">
    <div class="game-header">
      <h1 id="levelTitle">✦ 关卡 ✦</h1>
      <div class="level-info" id="levelInfo">第 1 关 · 0 步</div>
    </div>

    <!-- 提示栏 -->
    <div class="hint-bar" id="hintBar" style="display:none">
      <span id="hintText"></span>
    </div>

    <!-- 游戏画布区 + 覆盖层 -->
    <div class="game-center">
      <div class="game-wrapper">
        <canvas id="game"></canvas>

        <!-- 胜利覆盖层 -->
        <div class="overlay" id="victoryOverlay">
          <div class="overlay-content">
            <h2 id="victoryTitle">✦ 恭喜通关 ✦</h2>
            <p id="victoryMsg"></p>
            <div class="overlay-buttons">
              <button class="btn btn-gold" id="victoryNextBtn" style="display:none">下一关</button>
              <button class="btn" id="victoryRestartBtn">重新开始</button>
            </div>
          </div>
        </div>

        <!-- 死亡覆盖层 -->
        <div class="overlay" id="deathOverlay">
          <div class="overlay-content">
            <h2 id="deathTitle" style="color:#FF6B6B">💀 角色死亡 💀</h2>
            <p id="deathMsg" style="color:#FF8888;font-size:13px;line-height:1.4"></p>
            <div class="overlay-buttons">
              <button class="btn" id="deathRestartBtn" style="border-color:#FF6B6B;color:#FF6B6B">重新开始</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 游戏工具栏 -->
    <div id="gameToolbar" style="display:flex;justify-content:center;align-items:center">
      <div class="game-layout">
        <div class="game-left">
          <div class="dpad">
            <button class="dpad-btn empty"></button>
            <button class="dpad-btn d-up">▲</button>
            <button class="dpad-btn empty"></button>
            <button class="dpad-btn d-left">◀</button>
            <button class="dpad-btn empty"></button>
            <button class="dpad-btn d-right">▶</button>
            <button class="dpad-btn empty"></button>
            <button class="dpad-btn d-down">▼</button>
            <button class="dpad-btn empty"></button>
          </div>
        </div>
        <div class="game-right">
          <div class="char-selector">
            <button class="char-btn warrior" data-char="0"><span class="ci">⚔</span>战士</button>
            <button class="char-btn thief" data-char="1"><span class="ci">🗝</span>盗贼</button>
            <button class="char-btn mage" data-char="2"><span class="ci">✦</span>法师</button>
            <button class="char-btn priest" data-char="3"><span class="ci">✝</span>牧师</button>
          </div>
          <div style="flex:1;min-height:8px"></div>
          <button class="btn" id="switchBtn">Q 切换角色</button>
          <button class="btn" id="restartBtn">R 重置关卡</button>
        </div>
      </div>
    </div>

    <!-- 底部工具栏（居中） -->
    <div class="bottom-nav">
      <button class="btn" id="levelSelectBtn">Z 关卡选择</button>
      <button class="btn" id="editToolBtn">C 关卡编辑器</button>
    </div>

    <!-- 编辑器工具栏 -->
    <div id="editorToolbar" style="display:none">
      <div class="edit-tools">
        <span class="tool-label">笔刷:</span>
        <button class="tile-btn active" id="brushFloor">· 地板</button>
        <button class="tile-btn" id="brushWall">🧱 墙</button>
        <button class="tile-btn" id="brushBox">📦 箱子</button>
        <button class="tile-btn" id="brushTarget">🎯 目标</button>
        <button class="tile-btn" id="brushWater">🌊 水面</button>
        <button class="tile-btn" id="brushDoorP">🟣 紫门</button>
        <button class="tile-btn" id="brushDoorY">🟡 黄门</button>
        <button class="tile-btn" id="brushSwitchP">⚪ 紫开关</button>
        <button class="tile-btn" id="brushSwitchY">⚪ 黄开关</button>
        <button class="tile-btn" id="brushWarr">⚔ 战士</button>
        <button class="tile-btn" id="brushThief">🗝 盗贼</button>
        <button class="tile-btn" id="brushMage">✦ 法师</button>
        <button class="tile-btn" id="brushPriest">✝ 牧师</button>
        <button class="tile-btn" id="brushGoblin">👺 哥布林</button>
        <button class="tile-btn" id="brushDragonU">↑ 火龙</button>
        <button class="tile-btn" id="brushDragonR">→ 火龙</button>
        <button class="tile-btn" id="brushDragonD">↓ 火龙</button>
        <button class="tile-btn" id="brushDragonL">← 火龙</button>
        <button class="tile-btn" id="brushMonsterGate">🚧 怪物门</button>
      </div>
      <div class="edit-actions">
        <button class="btn" id="editDrawBtn">✏ 绘制</button>
        <button class="btn" id="editFillBtn">🪣 填充</button>
        <button class="btn" id="editResizeBtn">📐 调整尺寸</button>
        <button class="btn btn-save" id="editSaveBtn">💾 保存</button>
        <button class="btn" id="editCancelBtn">↩ 退出</button>
      </div>
    </div>

  </div>

  <!-- ===== LEVEL SELECT ===== -->
  <div class="screen" id="selectScreen">
    <div class="sel-header">
      <h1>关卡选择</h1>
      <button class="btn" id="backFromSelect"><kbd>Esc</kbd> 返回</button>
    </div>
    <div class="lvl-grid" id="lvlGrid"></div>
  </div>

  <!-- ===== TOAST ===== -->
  <div class="toast" id="toast"></div>

</div>

<!-- ES 模块入口 -->
<script type="module" src="js/modules/main.js"></script>

</body>
</html>
